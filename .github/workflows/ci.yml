name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lint:
    uses: ./.github/workflows/lint.yml

  test:
    needs: [lint]
    uses: ./.github/workflows/test.yml

  security:
    needs: [lint]
    uses: ./.github/workflows/security.yml

  audit:
    needs: [lint]
    uses: ./.github/workflows/audit.yml

  build:
    needs: [test, security, audit]
    uses: ./.github/workflows/build.yml
