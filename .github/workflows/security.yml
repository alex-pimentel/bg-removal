name: Security

on:
  workflow_call:
  workflow_dispatch:

jobs:
  security:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: ./.github/actions/setup-python
        with:
          working-directory: apps/api
          extra-packages: bandit pip-audit
      - run: bandit -r src/ -x tests -s B104
      - run: |
          python3 -c '
          import tomllib
          with open("pyproject.toml", "rb") as f:
              data = tomllib.load(f)
          with open("/tmp/reqs.txt", "w") as f:
              for dep in data["project"]["dependencies"]:
                  f.write(dep + "\n")
          '
      - run: pip-audit --strict -r /tmp/reqs.txt --no-deps
