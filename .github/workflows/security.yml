name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e apps/api/.[dev] bandit pip-audit
      - run: bandit -r apps/api/src/ -x tests -s B104
      - run: |
          python3 -c '
          import tomllib
          with open("apps/api/pyproject.toml", "rb") as f:
              data = tomllib.load(f)
          with open("/tmp/reqs.txt", "w") as f:
              for dep in data["project"]["dependencies"]:
                  f.write(dep + "\n")
          '
      - run: pip-audit --strict -r /tmp/reqs.txt --no-deps
