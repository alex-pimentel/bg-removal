name: Audit

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  scalability:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: bash scripts/audit_scalability.sh

  performance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -e apps/api/.[dev]
      - run: bash scripts/audit_performance.sh
