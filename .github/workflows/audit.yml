name: Audit

on:
  workflow_call:
  workflow_dispatch:

jobs:
  scalability:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - run: bash scripts/audit_scalability.sh

  performance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - run: pip install -e "apps/api/.[dev]"
      - run: bash scripts/audit_performance.sh
