name: Audit

on:
  workflow_call:
  workflow_dispatch:

jobs:
  scalability:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: bash scripts/audit_scalability.sh

  performance:
    runs-on: ubuntu-latest
    steps:
      - uses: ./.github/actions/setup-python
        with:
          working-directory: apps/api
      - run: bash scripts/audit_performance.sh
