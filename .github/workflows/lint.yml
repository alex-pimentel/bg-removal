name: Lint

on:
  workflow_call:
  workflow_dispatch:

jobs:
  lint-api:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: ./.github/actions/setup-python
        with:
          working-directory: apps/api
      - run: ruff check src/
      - run: mypy src/
