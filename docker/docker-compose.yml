services:
  api:
    build:
      context: ../apps/api
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - DEBUG=true
    volumes:
      - ../apps/api/src:/app/src
      - ../apps/api/tests:/app/tests
    depends_on:
      redis:
        condition: service_started
    command: uvicorn src.main:app --host 0.0.0.0 --port 8000 --reload

  web:
    build:
      context: ../apps/web
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    volumes:
      - ../apps/web/src:/app/src
      - ../apps/web/index.html:/app/index.html
    depends_on:
      - api

  worker:
    build:
      context: ../worker
      dockerfile: Dockerfile
    environment:
      - REDIS_URL=redis://redis:6379/0
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    volumes:
      - ../worker/src:/app/src
    depends_on:
      redis:
        condition: service_started

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
